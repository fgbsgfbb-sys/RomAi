name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install NDK + CMake
        run: |
          sdkmanager "ndk;26.1.10909125" "cmake;3.22.1"
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Clone llama.cpp (if needed)
        run: |
          if [ ! -d "app/src/main/cpp/llama.cpp" ]; then
            git clone https://github.com/ggerganov/llama.cpp.git app/src/main/cpp/llama.cpp
          fi
      - name: Build Debug APK
        run: ./gradlew assembleDebug
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: romai-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
