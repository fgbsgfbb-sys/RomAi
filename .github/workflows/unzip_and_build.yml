name: Unzip and Build

on:
  workflow_dispatch:

jobs:
  unzip-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove old files (except .git and the zip)
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '*.zip' -exec rm -rf {} \;

      - name: Unzip the archive
        run: |
          ZIP_FILE=$(ls *.zip 2>/dev/null | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "❌ ZIP-файл не найден!"
            exit 1
          fi
          echo "Распаковываем $ZIP_FILE ..."
          unzip -o "$ZIP_FILE"
          rm "$ZIP_FILE"

      # Шаг с git commit и push УДАЛЁН

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager "ndk;26.1.10909125" "cmake;3.22.1"

      - name: Clone llama.cpp
        run: |
          git clone https://github.com/ggerganov/llama.cpp.git app/src/main/cpp/llama.cpp
          cd app/src/main/cpp/llama.cpp
          git checkout master

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RomAI-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
